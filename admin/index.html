<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      // 🚩 Force JSON globally to prevent the 'main.js' interference
      extension: "json",
      format: "json",
      collections: [
        {
          name: "bvvb_editor", // 🚩 Unique name to bypass browser cache
          label: "Website Content",
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_data",
              file: "js/en.json",
              // 🚩 Tell React what to look for inside the JSON
              identifier_field: "trustName", 
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_data",
              file: "js/te.json",
              identifier_field: "trustName",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      // 🚩 Clear the user session one last time to force a fresh pull from GitHub
      localStorage.removeItem("decap-cms-user");
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
