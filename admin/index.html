<html>
<head>

    window.CMS_MANUAL_INIT = true;
  </script>
</head>
<body>

        backend: {
          name: "github",
          repo: "bvvbtrust-sketch/HTML_VERSION",

          base_url: "https://test2.bvvbtrust.org",
          auth_endpoint: "auth"

        public_folder: "/images/uploads"
      }
    });
  </script>

</html>
