<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      // 🚩 Tell the CMS to ONLY look for .json extensions
      extension: "json", 
      format: "json",
      collections: [
        {
          name: "site_data",
          label: "Website Content",
          editor: { preview: false },
          // 🚀 THE FIX: Explicitly list the files so it NEVER touches main.js
          files: [
            {
              label: "English Content",
              name: "en",
              file: "js/en.json", // Direct path
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te",
              file: "js/te.json", // Direct path
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
