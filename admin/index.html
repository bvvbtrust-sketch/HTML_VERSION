<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // --- 1. THE MESSAGE PROXY (The Sleight of Hand) ---
    // We intercept Decap's message listener and alter the message on the fly
    const origAddEventListener = window.addEventListener;
    window.addEventListener = function(type, listener, options) {
      if (type === 'message') {
        const proxyListener = function(event) {
          if (typeof event.data === 'string' && event.data.includes('authorization:github:success')) {
            console.log("Intercepted the popup's message! Faking the origin to trick Decap...");
            
            // Wrap the event in a Proxy to lie about the origin while keeping the window source intact
            const spoofedEvent = new Proxy(event, {
              get: function(target, prop) {
                // Tell Decap the message came from test2
                if (prop === 'origin') return 'https://test2.bvvbtrust.org'; 
                
                const value = target[prop];
                if (typeof value === 'function') return value.bind(target);
                return value;
              }
            });
            
            // Hand the perfect, spoofed message to Decap's native engine!
            return listener.call(this, spoofedEvent);
          }
          return listener.call(this, event);
        };
        return origAddEventListener.call(this, type, proxyListener, options);
      }
      return origAddEventListener.call(this, type, listener, options);
    };

    // --- 2. THE POPUP SENDER ---
    // If this window is the popup returning from GitHub with the token...
    if (window.location.hash.includes("access_token=")) {
      const token = new URLSearchParams(window.location.hash.substring(1)).get("access_token");
      const payload = 'authorization:github:success:{"token":"' + token + '","provider":"github"}';
      
      if (window.opener) {
        // Because the popup is now on test1, the browser WILL let this message through!
        window.opener.postMessage(payload, "*");
      }
      
      // Mission accomplished, close the popup.
      window.close();
    }

    // --- 3. STANDARD CONFIG ---
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    // Only boot Decap if we are in the main window (not the popup)
    if (window.CMS && !window.location.hash.includes("access_token=")) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
