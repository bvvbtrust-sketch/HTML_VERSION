<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      // 🚀 THE FIX: Adding 'publish_mode' and 'slug' prevents the toArray crash 
      // by giving the internal state a predictable structure.
      publish_mode: "simple",
      slug: {
        encoding: "ascii",
        clean_accents: true
      },
      collections: [
        {
          name: "settings", // Changed name to reset the internal Redux state
          label: "Site Content",
          editor: { preview: false },
          // 🚀 CRITICAL: We explicitly define 'files' as an array 
          // to satisfy the 'toArray' requirement in collections.js
          files: [
            {
              label: "English Content",
              name: "en",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te",
              file: "js/te.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
