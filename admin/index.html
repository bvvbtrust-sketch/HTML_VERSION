<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 🔥 THE VAULT REDIRECT LOGIC
    // 1. If we are inside the popup, grab the token from the URL and save it
    const hash = window.location.hash;
    if (hash.includes("access_token=")) {
      const token = new URLSearchParams(hash.substring(1)).get("access_token");
      
      // Save it using both the new and legacy keys just to be completely safe
      const userObj = JSON.stringify({ token: token, backendName: "github" });
      localStorage.setItem("decap-cms-user", userObj);
      localStorage.setItem("netlify-cms-user", userObj);
      
      // Close the popup!
      window.close();
    }

    // 2. If we are in the main window, listen for the vault to update
    window.addEventListener("storage", (event) => {
      if (event.key === "decap-cms-user" || event.key === "netlify-cms-user") {
        console.log("Token detected in vault! Reloading into dashboard...");
        window.location.reload();
      }
    });

    // --- STANDARD CONFIG ---
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.CMS && !window.location.hash.includes("access_token=")) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
