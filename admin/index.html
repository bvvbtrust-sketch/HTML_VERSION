<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>

  <!-- MUST be before CMS script -->
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
</head>

<body>
  <div id="nc-root"></div>

  <!-- Load CMS -->
  <script src="https://unpkg.com/decap-cms@3.11.0/dist/decap-cms.js"></script>

  <!-- Load YAML parser -->
  <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <!-- Manual init -->
<script>
  window.CMS_MANUAL_INIT = true;
</script>

<script src="https://unpkg.com/decap-cms@3.11.0/dist/decap-cms.js"></script>

<script>
  CMS.init({
    config: {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" }
              ]
            }
          ]
        }
      ]
    }
  });
</script>
</body>
</html>
