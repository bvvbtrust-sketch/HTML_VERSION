<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    // 1. Configuration
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string" },
                { label: "ధ్యేయం", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };

    // 2. The Bulletproof Auto-Login Listener
    window.addEventListener("message", (event) => {
      // Check if the message is from our proxy and has the success string
      if (event.origin === "https://test2.bvvbtrust.org" && typeof event.data === "string" && event.data.includes("authorization:github:success")) {
        
        console.log("Intercepted valid token! Forcing CMS login...");
        
        // Extract the token payload
        const jsonString = event.data.replace("authorization:github:success:", "");
        const payload = JSON.parse(jsonString);
        
        // Save it exactly where Decap CMS looks for it
        localStorage.setItem("decap-cms-user", JSON.stringify({
          token: payload.token,
          backendName: "github"
        }));
        
        // Refresh the page so Decap CMS boots up already logged in
        window.location.reload();
      }
    }, false);
  </script>
</head>

<body>
  <div id="nc-root"></div>

  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

  <script>
    // 3. Initialize the CMS
    if (window.CMS) {
      CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
