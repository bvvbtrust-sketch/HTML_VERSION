<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "bvvbtrust-sketch/HTML_VERSION",   // <-- change if needed
          branch: "main",                          // <-- confirm branch
          base_url: "https://test2.bvvbtrust.org",
          auth_endpoint: "auth"
        },
        media_folder: "images/uploads",
        public_folder: "/images/uploads",
        collections: [
          {
            name: "pages",
            label: "Pages",
            files: [
              {
                label: "Home",
                name: "home",
                file: "index.html",
                fields: [
                  { label: "Title", name: "title", widget: "string" }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
