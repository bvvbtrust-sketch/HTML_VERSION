<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth"
      },
      media_folder: "images",
      public_folder: "images",
      // Adding a display_name helps the React UI initialize correctly
      site_url: "https://test1.bvvbtrust.org",
      display_name: "BVVB Trust CMS",
      collections: [
        {
          name: "pages",
          label: "Website Pages",
          delete: false,
          editor: { preview: false },
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              format: "json", // Explicitly tell Decap it's JSON
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string", default: "BVVB Trust" },
                { label: "Motto", name: "motto", widget: "string", default: "" }
              ]
            },
            {
              label: "Telugu Content",
              name: "te_content",
              file: "js/te.json",
              format: "json",
              fields: [
                { label: "ట్రస్ట్ పేరు", name: "trustName", widget: "string", default: "" },
                { label: "ధ్యేయం", name: "motto", widget: "string", default: "" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
