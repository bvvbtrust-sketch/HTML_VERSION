<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // 1. Fetch the file manually
    fetch('./config.yml')
      .then(response => response.text()) // Get as text, ignoring Content-Type
      .then(text => {
        // 2. Parse the text as JSON/YAML
        const config = JSON.parse(text);
        
        // 3. Manually initialize the CMS
        window.CMS.init({ config });
      })
      .catch(err => {
        console.error("Manual config load failed:", err);
      });
  </script>
</body>
</html>
