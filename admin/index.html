<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org",
        auth_endpoint: "auth",
        use_graphql: false // 🚩 Essential to prevent toArray crashes
      },
      display_name: "BVVB Trust",
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "setup",
          label: "Site Content",
          files: [
            {
              label: "English",
              name: "en",
              file: "js/en.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            },
            {
              label: "Telugu",
              name: "te",
              file: "js/te.json",
              fields: [
                { label: "Trust Name", name: "trustName", widget: "string" },
                { label: "Motto", name: "motto", widget: "string" }
              ]
            }
          ]
        }
      ]
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@3.1.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
