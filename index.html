<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <script>
    window.CMS_MANUAL_INIT = true;
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "bvvbtrust-sketch/HTML_VERSION",
        branch: "main",
        base_url: "https://test2.bvvbtrust.org" // No trailing slash
      },
      media_folder: "images",
      public_folder: "images",
      collections: [
        {
          name: "website_content",
          label: "Website Content",
          files: [
            {
              label: "English Content",
              name: "en_content",
              file: "js/en.json",
              fields: [{ label: "Trust Name", name: "trustName", widget: "string" }]
            }
          ]
        }
      ]
    };

    // 🚀 THE SANITIZER: This forces Decap to accept the popup message
    const origAddEventListener = window.addEventListener;
    window.addEventListener = function(type, listener, options) {
      if (type === 'message') {
        const origListener = listener;
        listener = function(event) {
          if (typeof event.data === 'string' && event.data.includes('authorization:github:success')) {
            console.log("Sanitizer caught the token! Rebuilding payload for Decap...");
            
            try {
              // 1. Extract the raw token from your proxy
              const rawPayload = JSON.parse(event.data.replace("authorization:github:success:", ""));
              
              // 2. Rebuild the exact payload Decap's engine requires
              const perfectData = "authorization:github:success:" + JSON.stringify({
                token: rawPayload.token,
                provider: "github"
              });

              // 3. Create a fake event with the PERFECT origin to bypass Decap's strict security check
              const fakeEvent = new MessageEvent('message', {
                data: perfectData,
                origin: "https://test2.bvvbtrust.org", // MUST exactly match base_url
                source: window
              });

              console.log("Handing perfect payload to Decap CMS React Engine...");
              
              // 4. Feed it to Decap
              return origListener.call(this, fakeEvent);
            } catch (err) {
              console.error("Sanitizer failed:", err);
            }
          }
          // Let all other normal messages pass through
          return origListener.call(this, event);
        };
      }
      origAddEventListener.call(this, type, listener, options);
    };
  </script>
</head>

<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>
  
  <script>
    if (window.CMS) {
      window.CMS.init({ config: window.CMS_CONFIG });
    }
  </script>
</body>
</html>
